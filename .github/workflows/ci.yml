name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: lint + unit
    runs-on: ubuntu-latest
    env:
      # CI는 실물 임베딩 모델(bge-m3)을 내려받지 않는다 — 스텁 강제(conftest와 이중 방어)
      SKINMATE_EMBED_STUB: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: black
        run: black --check .
      - name: mypy
        run: mypy src
      - name: unit tests
        run: pytest --ignore=tests/contracts
      - name: contract tests (⭐7 스텁↔실물·DB 파리티)
        run: pytest tests/contracts

  db-smoke:
    name: db extensions smoke
    runs-on: ubuntu-latest
    env:
      # docker-compose.yml이 POSTGRES_PASSWORD를 필수값으로 강제해서(.env 없는 CI에선
      # 값이 없으면 interpolation 자체가 실패) CI 전용 값을 여기서 지정한다.
      POSTGRES_PASSWORD: ci-only-not-a-secret
    steps:
      - uses: actions/checkout@v4
      - name: build & start db
        run: docker compose up -d --build db
      - name: wait healthy
        run: |
          for i in $(seq 1 40); do
            h=$(docker inspect -f '{{.State.Health.Status}}' skinmate-db 2>/dev/null || true)
            [ "$h" = "healthy" ] && { echo "healthy"; break; }
            sleep 3
          done
      - name: smoke (age + vector)
        run: bash scripts/db-smoke.sh
